<!DOCTYPE html>
<html>

<head>

<title>Lamu Gallery</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
}

</style>

</head>

<body>

<header>
<h1>Lamu Photo Gallery</h1>
</header>

<div class="gallery">

<img src="images/lamu-3.jpg">
<img src="images/lamu-1024x576.jpg">

<img src="images/image12.jpg">

</div>

</body>

</html>
