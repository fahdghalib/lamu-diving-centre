<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#003366;
color:white;
padding:20px;

}

nav{
background:#0059b3;
padding:12px;
text-align:center;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

.slider{
position:relative;
height:500px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.active{
opacity:1;
}

.section{
padding:40px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
width:260px;
background:white;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.2);
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

footer{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

</style>

</head>

<script>

let slides=document.querySelectorAll(".slide");
let index=0;

function changeSlide(){

slides[index].classList.remove("active");

index++;

if(index>=slides.length){
index=0;
}

slides[index].classList.add("active");

}

setInterval(changeSlide,4000);

</script>
